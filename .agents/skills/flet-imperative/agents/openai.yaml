interface:
  display_name: "Flet Imperative"
  short_description: "Flet 0.85.x imperative/procedural app development (page.add, auto-update, 85+ breaking changes, API traps, page.navigate / pop_views_until, Screenshot, DragTargetEvent migration)."
  brand_color: "#0EA5E9"
  default_prompt: |
    Use this skill when building Flet apps in imperative mode (page.add, page.update).
    Priorities:
    - Use ft.run(main) — never ft.app()
    - ft.Colors.NAME (uppercase C), ft.Alignment.CENTER (uppercase A)
    - Tabs three-part pattern (Tabs + TabBar + TabBarView with height)
    - page.show_dialog() / page.pop_dialog() — never page.open()
    - page.navigate(route) / await page.push_route(route) — never page.go(...) (deprecated)
    - Drag events: use local_position / global_position (.x / .y / .offset deprecated 0.85.0)
    - Screenshots: set page.enable_screenshots = True before take_screenshot / take_animation
    - Verify uncertain APIs with inspect before using
policy:
  allow_implicit_invocation: true
